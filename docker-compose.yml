version: "3.8"

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: optimus_backend
    ports:
      - "8000:8000"
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - OPTIMUS_API_KEY=${OPTIMUS_API_KEY}
      - OLLAMA_HOST=http://ollama:11434
      - CLAUDE_MODEL=${CLAUDE_MODEL:-claude-sonnet-4-6}
      - MISTRAL_MODEL=${MISTRAL_MODEL:-mistral:7b-instruct-v0.2-q4_K_M}
      - EMBED_MODEL=${EMBED_MODEL:-nomic-embed-text}
      - SESSION_TOKEN_BUDGET=${SESSION_TOKEN_BUDGET:-500000}
      - SUMMARISER_THRESHOLD=${SUMMARISER_THRESHOLD:-60000}
      - KALI_HOST=kali
      - KALI_PORT=22
      - TOR_SOCKS_HOST=tor
      - TOR_SOCKS_PORT=9050
      - MEMORY_DB_PATH=/app/data/optimus_memory.db
      - INTEL_CACHE_PATH=/app/data/intel_cache
      - REPORTS_PATH=/app/data/reports
      - SCOPE_FILE_PATH=/app/config/scope.yaml
    volumes:
      - ./data:/app/data
      - ./config:/app/config
      - models_input:/models
      - ml_results:/results
    depends_on:
      - ollama
      - kali
      - tor
    networks:
      - optimus_internal
    mem_limit: 4g
    cpus: 2

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: optimus_frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    depends_on:
      - backend
    networks:
      - optimus_internal
    mem_limit: 1g
    cpus: 1

  ollama:
    image: ollama/ollama:latest
    container_name: optimus_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    networks:
      - optimus_internal
    mem_limit: 8g
    cpus: 4
    deploy:
      resources:
        limits:
          memory: 8g

  kali:
    build:
      context: ./kali
      dockerfile: Dockerfile
    container_name: optimus_kali
    ports:
      - "2222:22"
    networks:
      - optimus_internal
    mem_limit: 4g
    cpus: 2
    volumes:
      - kali_workspace:/home/kali/workspace

  ml-runtime:
    build:
      context: ./ml-runtime
      dockerfile: Dockerfile
    container_name: optimus_ml_runtime
    network_mode: none
    read_only: true
    volumes:
      - models_input:/models:ro
      - ml_results:/results
    user: mluser
    mem_limit: 8g
    cpus: 4
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

  tor:
    image: dperson/torproxy:latest
    container_name: optimus_tor
    networks:
      - optimus_internal
    ports:
      - "9050:9050"

volumes:
  optimus_memory:
  intel_cache:
  models_input:
  ml_results:
  reports:
  ollama_models:
  kali_workspace:

networks:
  optimus_internal:
    driver: bridge
    internal: true