# Optimus Prime v2.0 — Docker Compose (9 Services)
# Section 17.1 of the architecture specification
# Local deployment — cloud-portable by design

services:
  # --- Frontend ---
  frontend:
    image: node:20-alpine
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
    working_dir: /app
    command: sh -c "npm install && npm run dev"
    depends_on:
      - backend
    restart: unless-stopped

  # --- Backend (FastAPI) ---
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    image: optimus-backend:latest
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app/backend
      - optimus_sessions:/app/data/sessions
      - optimus_events:/app/data/events
      - optimus_xai:/app/data/xai
      - ml_runtime_ipc:/app/data/ml-runtime-ipc
      - ics_runtime_ipc:/app/data/ics-runtime-ipc
      - optimus_memory:/app/data/memory
      - client_profiles:/app/data/client_profiles
    environment:
      - PYTHONPATH=/app
    env_file:
      - .env
    depends_on:
      - ollama
      - kali
    mem_limit: 4g
    cpus: 2.0
    restart: unless-stopped

  # --- Kali Linux (Engine 1 tooling) ---
  kali:
    build:
      context: .
      dockerfile: kali/Dockerfile
    image: optimus-kali:latest
    ports:
      - "2222:22"
    mem_limit: 2g
    cpus: 1.5
    restart: unless-stopped

  # --- Ollama (Gemma4 + nomic-embed-text) ---
  ollama:
    image: ollama/ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_models:/root/.ollama
    mem_limit: 12g
    cpus: 4.0
    restart: unless-stopped

  # --- ML Runtime (Engine 3 — network isolated) ---
  ml-runtime:
    build:
      context: .
      dockerfile: ml-runtime/Dockerfile
    image: optimus-ml-runtime:latest
    network_mode: "none"
    volumes:
      - ml_runtime_ipc:/data/ipc
    mem_limit: 4g
    cpus: 2.0
    restart: unless-stopped

  # --- Tor Proxy (Dark web research) ---
  tor:
    image: dperson/torproxy
    ports:
      - "9050:9050"
    restart: unless-stopped

  # --- DVWA Sandbox (Custom tool validation + E2E tests) ---
  sandbox:
    image: vulnerables/web-dvwa
    ports:
      - "8080:80"
    mem_limit: 512m
    cpus: 0.5
    restart: unless-stopped

  # --- ICS Runtime (Engine 2 — network isolated) ---
  ics-runtime:
    build:
      context: .
      dockerfile: ics-runtime/Dockerfile
    image: optimus-ics-runtime:latest
    network_mode: "none"
    volumes:
      - ics_runtime_ipc:/data/ipc
    mem_limit: 1g
    cpus: 1.0
    restart: unless-stopped

  # NOTE: sandbox_manager runs as a host sidecar process, not a container.
  # It monitors ml-runtime and ics-runtime via task_status.json watchdog.
  # Start with: python -m backend.tools.sandbox_manager

volumes:
  optimus_sessions:
  optimus_events:
  optimus_xai:
  optimus_memory:
  client_profiles:
  ollama_models:
  ml_runtime_ipc:
  ics_runtime_ipc:
